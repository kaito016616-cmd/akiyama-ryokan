<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>お知らせ | あきやま旅館</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{
            --bg:#f0f8ff;--bg2:#e2f1fb;--card:#ffffff;
            --ocean:#0088cc;--teal:#00b4d8;
            --grad:linear-gradient(135deg,#0088cc,#00b4d8);
            --txt:#0d1b2a;--txt2:#3d5a73;--txt3:#8aabb8;
            --border:rgba(0,136,204,0.15);
            --shadow:0 4px 24px rgba(0,100,180,0.1);
            --r:12px;--rl:16px;
            --jp:'Noto Sans JP',sans-serif;--en:'Montserrat',sans-serif;
        }
        body{font-family:var(--jp);background:var(--bg);color:var(--txt);}
        a{color:inherit;text-decoration:none;}

        .nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;}
        .nav-back{font-family:var(--en);font-size:13px;font-weight:600;color:var(--ocean);display:flex;align-items:center;gap:6px;transition:opacity .2s;}
        .nav-back:hover{opacity:.7;}
        .nav-logo{font-family:var(--en);font-size:14px;font-weight:700;color:var(--txt);letter-spacing:2px;}
        .nav-reserve{background:var(--grad);color:#fff;font-family:var(--en);font-size:12px;font-weight:700;letter-spacing:1px;padding:10px 22px;border-radius:50px;transition:opacity .2s;}
        .nav-reserve:hover{opacity:.85;}

        .page-head{background:#fff;padding:56px 0 40px;border-bottom:1px solid var(--border);}
        .wrap{max-width:760px;margin:0 auto;padding:0 40px;}
        .sec-label{font-family:var(--en);font-size:11px;font-weight:700;letter-spacing:3px;color:var(--ocean);text-transform:uppercase;margin-bottom:6px;}
        .sec-title{font-size:28px;font-weight:700;}
        .bar{width:36px;height:3px;background:var(--grad);border-radius:2px;margin-top:12px;}

        .news-list{background:#fff;margin-top:32px;border-radius:var(--rl);box-shadow:var(--shadow);overflow:hidden;}
        .news-item{padding:28px 36px;border-bottom:1px solid var(--border);display:flex;gap:28px;}
        .news-item:last-child{border-bottom:none;}
        .news-dt{font-family:var(--en);font-size:12px;color:var(--txt3);white-space:nowrap;flex-shrink:0;min-width:90px;padding-top:3px;}
        .news-ttl{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:6px;}
        .news-body{font-size:14px;color:var(--txt2);line-height:1.75;white-space:pre-wrap;}
        .news-empty{padding:60px 36px;text-align:center;color:var(--txt3);font-size:14px;}
        .news-loading{padding:60px 36px;text-align:center;color:var(--txt3);font-size:14px;}

        .foot{background:#0d1b2a;color:#7a95ad;padding:32px 40px;text-align:center;font-size:13px;line-height:1.8;margin-top:56px;}
        .foot a{color:#7a95ad;transition:color .2s;}
        .foot a:hover{color:#fff;}

        @media(max-width:640px){
            .nav{padding:0 20px;}
            .wrap{padding:0 20px;}
            .news-item{flex-direction:column;gap:6px;padding:22px 24px;}
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html" class="nav-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg>
        TOP に戻る
    </a>
    <span class="nav-logo">AKIYAMA RYOKAN</span>
    <a href="https://reserva.be/akiyamaryokan" target="_blank" class="nav-reserve">予約する</a>
</nav>

<div class="page-head">
    <div class="wrap">
        <p class="sec-label">News</p>
        <h1 class="sec-title">お知らせ</h1>
        <div class="bar"></div>
    </div>
</div>

<div class="wrap">
    <div class="news-list" id="news-list">
        <p class="news-loading">読み込み中...</p>
    </div>
</div>

<footer class="foot">
    <p>〒413-0233 静岡県伊東市赤沢163-2 &nbsp;|&nbsp; TEL: 090-6398-3964</p>
    <p style="margin-top:6px;">&copy; 2025 あきやま旅館 &nbsp;·&nbsp; <a href="index.html">トップページ</a></p>
</footer>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(async function(){
    const list=document.getElementById('news-list');
    if(typeof SUPABASE_URL==='undefined'||SUPABASE_URL.startsWith('YOUR_')){
        list.innerHTML='<p class="news-empty">現在お知らせはありません。</p>';return;
    }
    try{
        const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
        const{data,error}=await sb.from('news').select('title,content,published_at')
            .eq('is_published',true).order('published_at',{ascending:false});
        if(error||!data||data.length===0){
            list.innerHTML='<p class="news-empty">現在お知らせはありません。</p>';return;
        }
        function fmt(d){const dt=new Date(d);return`${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;}
        function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
        list.innerHTML=data.map(p=>`<div class="news-item">
            <span class="news-dt">${fmt(p.published_at)}</span>
            <div><p class="news-ttl">${esc(p.title)}</p><p class="news-body">${esc(p.content)}</p></div>
        </div>`).join('');
    }catch(e){list.innerHTML='<p class="news-empty">現在お知らせはありません。</p>';}
})();
</script>
</body>
</html>
